services:
  admin-panel:
    build: .
    container_name: tundra_market_admin
    ports:
      - "5173:80"
    environment:
      API_BASE_URL: ${API_BASE_URL:-/api/v1}
      BACKEND_ORIGIN: ${BACKEND_ORIGIN:-http://host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
